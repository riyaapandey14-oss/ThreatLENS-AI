{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-3xl mb-8 text-purple-400 font-bold text-center">SOC Analyst AI 🤖</h1>
    
    <!-- Conversation History -->
    {% if conversation %}
    <div class="space-y-4 mb-8 max-h-96 overflow-y-auto p-4 bg-gray-900/50 border border-gray-700 rounded-2xl">
        {% for msg in conversation %}
        <div class="flex {% if loop.last %}opacity-50{% endif %}">
            <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center mr-4 flex-shrink-0">
                <span class="text-blue-400 font-bold">👤</span>
            </div>
            <div class="bg-gray-800/50 p-4 rounded-xl max-w-xs">
                <p class="text-sm text-gray-300">{{ msg.user }}</p>
            </div>
        </div>
        <div class="flex justify-end">
            <div class="w-12 h-12 bg-purple-500/20 rounded-2xl flex items-center justify-center mr-4 flex-shrink-0">
                <span class="text-purple-400 font-bold">🤖</span>
            </div>
            <div class="bg-gradient-to-r from-purple-500/20 to-pink-500/20 p-4 rounded-xl max-w-xs border border-purple-500/30">
                <p class="text-sm whitespace-pre-wrap">{{ msg.ai }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Input Form -->
    <form method="POST" class="space-y-4">
        <div class="flex space-x-4">
            <input 
                type="text" 
                name="message" 
                placeholder="Ask about phishing, passwords, incidents, MFA..." 
                class="flex-1 p-4 rounded-xl border-2 border-gray-600 bg-gray-900/50 focus:border-purple-400 focus:outline-none text-lg placeholder-gray-500"
                required
                value=""
            >
            <button type="submit" class="w-20 h-16 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 rounded-xl font-bold text-lg shadow-2xl hover:shadow-purple-500/25 transform hover:scale-105 transition-all">
                Send
            </button>
        </div>
    </form>

    <!-- Knowledge Topics -->
    <div class="mt-12 p-6 bg-gray-900/30 border border-gray-700 rounded-2xl">
        <h3 class="text-lg font-bold text-gray-300 mb-4">💡 Try asking about:</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button class="p-3 bg-blue-500/20 border border-blue-500/30 rounded-xl hover:bg-blue-500/40 text-xs">Phishing detection</button>
            <button class="p-3 bg-green-500/20 border border-green-500/30 rounded-xl hover:bg-green-500/40 text-xs">Password security</button>
            <button class="p-3 bg-orange-500/20 border border-orange-500/30 rounded-xl hover:bg-orange-500/40 text-xs">Incident response</button>
            <button class="p-3 bg-purple-500/20 border border-purple-500/30 rounded-xl hover:bg-purple-500/40 text-xs">MFA best practices</button>
        </div>
    </div>
</div>
{% endblock %}
