<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ThreatLens AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%); }
    </style>
</head>
<body class="min-h-screen text-white bg-gray-900">
    <nav class="bg-gray-900/95 backdrop-blur-md border-b border-gray-800/50 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    ThreatLens AI
                </a>
                <div class="space-x-6">
                    <a href="/" class="hover:text-cyan-400 transition-colors">Home</a>
                    <a href="/password" class="hover:text-cyan-400 transition-colors">Password</a>
                    <a href="/url" class="hover:text-emerald-400 transition-colors">URL Scanner</a>
                    <a href="/ai" class="hover:text-purple-400 transition-colors">AI</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-0">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-800 mt-20">
        <div class="max-w-6xl mx-auto px-6 py-12 text-center text-gray-500">
            <p>&copy; 2024 ThreatLens AI. Stay safe online.</p>
        </div>
    </footer>
</body>
</html>
