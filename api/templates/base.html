<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ThreatLens AI — a fully local cybersecurity web app with zero paid APIs. Analyze passwords, scan URLs for phishing, detect email threats, ask the AI knowledge assistant, or test skills with a security quiz. Built in Flask with a dark cyber theme, neon accents, and responsive design. All data stays on your machine. Perfect for security awareness.">
    <title>{% block title %}ThreatLens AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">ThreatLens<span class="logo-ai"> AI</span></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link{% if request.endpoint == 'main.home' %} active{% endif %}">Home</a>
                <a href="/password" class="nav-link{% if request.endpoint == 'main.password' %} active{% endif %}">Password</a>
                <a href="/url" class="nav-link{% if request.endpoint == 'main.url' %} active{% endif %}">URL</a>
                <a href="/email" class="nav-link{% if request.endpoint == 'main.email' %} active{% endif %}">Email</a>
                <a href="/ask" class="nav-link{% if request.endpoint == 'main.ask' %} active{% endif %}">Ask AI</a>
                <a href="/quiz" class="nav-link{% if request.endpoint == 'main.quiz' %} active{% endif %}">Quiz</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>🛡️ ThreatLens AI — Rule-Based Cybersecurity Intelligence</p>
            <p class="footer-sub">No paid APIs. No cloud AI. Pure local intelligence.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</body>
</html>
